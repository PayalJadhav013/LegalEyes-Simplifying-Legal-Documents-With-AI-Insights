services:

  postgres:
    image: postgres:16-alpine
    container_name: legaleyes-postgres
    environment:
      POSTGRES_DB: legaleyes
      POSTGRES_USER: legaleyes
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legaleyes -d legaleyes"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  chroma:
    image: chromadb/chroma:0.5.3
    container_name: legaleyes-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  fastapi:
    build: ./fastapi-service
    container_name: legaleyes-fastapi
    ports:
      - "8001:8001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
    depends_on:
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  springboot:
    build: ./spring-boot-service
    container_name: legaleyes-springboot
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/legaleyes
      SPRING_DATASOURCE_USERNAME: legaleyes
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      AI_SERVICE_BASE_URL: http://legaleyes-fastapi:8001
      
      JWT_SECRET: bXlTdXBlclNlY3JldEtleUZvckpXVEF1dGhlbnRpY2F0aW9uMTIzNDU2
      JWT_EXPIRATION: 3600000
      GOOGLE_CLIENT_ID: 233701657275-c8g7gh2eg1ol6dli944hn0ico9m5dd0p.apps.googleusercontent.com
    depends_on:
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  chroma_data: